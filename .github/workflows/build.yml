name: Build OmniFlux Multi-Platform

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt pyinstaller
      - run: |
          pyinstaller --onefile --console `
            --name "OmniFlux" `
            --version-file version_info.txt `
            --add-data "frontend;frontend" `
            --add-data "backend;backend" `
            --hidden-import "uvicorn.logging" `
            --hidden-import "uvicorn.loops.auto" `
            --hidden-import "uvicorn.protocols.http.auto" `
            --collect-all "bleak" `
            main.py
      - uses: actions/upload-artifact@v4
        with: { name: OmniFlux-Windows, path: dist/OmniFlux.exe }

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt pyinstaller
      - run: |
          pyinstaller --onefile --windowed \
            --name "OmniFlux" \
            --add-data "frontend:frontend" \
            --add-data "backend:backend" \
            --hidden-import "uvicorn.logging" \
            --hidden-import "uvicorn.loops.auto" \
            --hidden-import "uvicorn.protocols.http.auto" \
            --collect-all "bleak" \
            main.py
      - run: hdiutil create -volname "OmniFlux" -srcfolder dist/OmniFlux.app -ov -format UDZO dist/OmniFlux.dmg
      - uses: actions/upload-artifact@v4
        with: { name: OmniFlux-macOS, path: dist/OmniFlux.dmg }

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: sudo apt-get update && sudo apt-get install -y libglib2.0-dev
      - run: pip install -r requirements.txt pyinstaller
      - run: |
          pyinstaller --onefile --console \
            --name "OmniFlux" \
            --add-data "frontend:frontend" \
            --add-data "backend:backend" \
            --hidden-import "uvicorn.logging" \
            --hidden-import "uvicorn.loops.auto" \
            --hidden-import "uvicorn.protocols.http.auto" \
            --collect-all "bleak" \
            main.py
      - run: cd dist && tar -czf OmniFlux-linux.tar.gz OmniFlux
      - uses: actions/upload-artifact@v4
        with: { name: OmniFlux-Linux, path: dist/OmniFlux-linux.tar.gz }

  release:
    needs: [build-windows, build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: OmniFlux-*
          merge-multiple: false
          path: artifacts
      - run: |
          mkdir release
          mv artifacts/OmniFlux-Windows/OmniFlux.exe release/OmniFlux-windows.exe
          mv artifacts/OmniFlux-macOS/OmniFlux.dmg release/OmniFlux-macos.dmg
          mv artifacts/OmniFlux-Linux/OmniFlux-linux.tar.gz release/OmniFlux-linux.tar.gz
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
